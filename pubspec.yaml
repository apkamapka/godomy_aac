name: godomy_aac
description: godoMyAAC - AAC Communication App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Code Generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Routing
  go_router: ^14.0.0

  # Localization
  intl: ^0.20.2

  # TTS & Audio
  flutter_tts: ^4.0.2
  record: ^5.1.2
  audioplayers: ^6.1.0

  # Linki zewnętrzne (strona autora, polityka prywatności, regulamin)
  url_launcher: ^6.2.5

  # Numer wersji aplikacji (czytany automatycznie z pubspec)
  package_info_plus: ^8.0.0

  # Kopie zapasowe profili (pakowanie ZIP + udostępnianie pliku)
  archive: ^3.6.1
  share_plus: ^10.0.0

  # Images
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  cached_network_image: ^3.3.1
  flutter_image_compress: ^2.1.0
  flutter_layout_grid: ^2.0.7
  gif_view: ^0.4.3

  # Storage & Utils
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  uuid: ^4.3.3
  shared_preferences: ^2.2.2

  # Color Picker
  flutter_colorpicker: ^1.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Code Generation
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.11
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  isar_generator: ^3.1.0+1

  # sprawdzanie tych samych grafik
  crypto: ^3.0.3

  # Testing
  mocktail: ^1.0.3

  # App Icon Generator
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/category_icons/
    - assets/images/
    - assets/ui_icons/

# Wymuszamy starszą wersję record_platform_interface (bez startStream)
dependency_overrides:
  record_platform_interface: 1.2.0

# Konfiguracja ikony aplikacji - OPCJA A (bez adaptive icons)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"